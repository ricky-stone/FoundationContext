name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Swift Tests
    runs-on: macos-26

    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: swift test
